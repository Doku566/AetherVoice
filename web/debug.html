<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Search Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1115;
            color: #cfd8dc;
            font-family: monospace;
        }
    </style>
</head>

<body class="p-8 max-w-4xl mx-auto">
    <h1 class="text-2xl text-cyan-400 mb-4 font-bold border-b border-cyan-900 pb-2">Search API Diagnostics</h1>

    <div class="flex gap-2 mb-6">
        <input type="text" id="query" value="how to make a paper airplane"
            class="flex-1 bg-black/50 border border-gray-700 rounded px-4 py-2 focus:border-cyan-500 outline-none text-white">
        <button onclick="runTest()"
            class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded font-bold transition">TEST API</button>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <!-- Status -->
        <div class="bg-black/30 p-4 rounded border border-gray-800">
            <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-2">Endpoint Status</h2>
            <div id="status" class="text-yellow-500">Waiting...</div>
            <div id="time" class="text-xs text-gray-600 mt-1"></div>
        </div>

        <!-- Result Preview -->
        <div class="bg-black/30 p-4 rounded border border-gray-800">
            <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-2">Video Detection</h2>
            <div id="video-check" class="text-gray-400 text-sm">No data</div>
        </div>
    </div>

    <h2 class="text-xs uppercase tracking-widest text-gray-500 mt-8 mb-2">Raw JSON Response</h2>
    <pre id="json-output"
        class="bg-black p-4 rounded border border-gray-800 overflow-auto h-96 text-xs text-green-400"></pre>

    <script>
        async function runTest() {
            const q = document.getElementById('query').value;
            const statusEl = document.getElementById('status');
            const jsonEl = document.getElementById('json-output');
            const vidEl = document.getElementById('video-check');

            statusEl.innerText = "Querying /api/search...";
            statusEl.className = "text-blue-400 animate-pulse";
            jsonEl.innerText = "Fetching...";
            vidEl.innerHTML = "";

            const start = performance.now();

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const time = (performance.now() - start).toFixed(0);
                document.getElementById('time').innerText = `${time}ms`;

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                statusEl.innerText = "SUCCESS (200 OK)";
                statusEl.className = "text-green-500 font-bold";
                jsonEl.innerText = JSON.stringify(data, null, 2);

                // Analyze Video
                const video = data.find(item => item.type === 'video');
                if (video) {
                    vidEl.innerHTML = `
                        <div class="text-green-400 font-bold">YES - Video Found</div>
                        <div class="mt-2 text-white">${video.title}</div>
                        <a href="${video.href}" target="_blank" class="block mt-1 text-blue-400 underline truncate">${video.href}</a>
                        <div class="mt-2 bg-gray-900 p-2 rounded">
                            <iframe width="100%" height="150" src="${video.href.replace('watch?v=', 'embed/')}" frameborder="0"></iframe>
                        </div>
                    `;
                } else {
                    vidEl.innerHTML = `<div class="text-red-500 font-bold">NO VIDEO FOUND IN RESPONSE</div>`;
                }

                if (data.error) {
                    statusEl.innerText = "API ERROR";
                    statusEl.className = "text-red-500 font-bold";
                }

            } catch (err) {
                statusEl.innerText = "FETCH FAILED";
                statusEl.className = "text-red-600 font-bold";
                jsonEl.innerText = err.toString();
            }
        }
    </script>
</body>

</html>
